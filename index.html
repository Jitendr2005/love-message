<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Favorite Person ❤️</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        overflow:hidden;
    }

    .card{
        text-align:center;
        background:white;
        padding:40px;
        border-radius:25px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        max-width:500px;
        animation:float 3s ease-in-out infinite;
    }

    h1{
        color:#ff4d6d;
        margin-bottom:15px;
    }

    p{
        font-size:18px;
        color:#444;
        line-height:1.6;
    }

    button{
        margin-top:20px;
        padding:12px 25px;
        border:none;
        border-radius:30px;
        background:#ff4d6d;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        transform:scale(1.05);
    }

    @keyframes float{
        0%,100%{transform:translateY(0);}
        50%{transform:translateY(-10px);}
    }

    .heart{
        position:absolute;
        color:red;
        animation:fall linear infinite;
    }

    @keyframes fall{
        from{
            transform:translateY(-100px);
        }
        to{
            transform:translateY(110vh);
        }
    }
</style>
</head>
<body>

<div class="card">
    <h1>❤️ Hey Beautiful ❤️</h1>
    <p>
        I know you're upset right now.<br><br>
        But I want you to remember something:
        you mean a lot to me, and seeing you smile
        is one of my favorite things in the world. ✨
        <br><br>
        No matter what happened today,
        I'm here for you. 💕
    </p>

    <button onclick="showLove()">Click Me 💌</button>
</div>

<script>
function showLove(){
    alert("You are loved, appreciated, and absolutely adorable ❤️😊");
}

function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    heart.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
